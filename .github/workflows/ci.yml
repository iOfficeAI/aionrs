name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Setup vx (installs Rust + just from vx.toml)
        uses: loonghao/vx@main
        with:
          setup: 'true'
          cache: 'true'

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Check formatting
        run: vx just fmt-check

      - name: Clippy (warnings = errors)
        run: vx just lint

      - name: Run tests (nextest CI profile)
        run: vx just test-ci

      - name: Security audit
        run: vx cargo audit
        continue-on-error: true

      - name: Upload nextest JUnit report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: nextest-junit-${{ matrix.os }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore

  # ── Annotate PR / commit with test results ────────────────────────────
  report:
    needs: ci
    if: always()
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Download nextest JUnit artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: nextest-junit-*
          merge-multiple: true
          path: junit-reports
        continue-on-error: true

      - name: Publish test report
        uses: dorny/test-reporter@v2
        if: hashFiles('junit-reports/**/*.xml') != ''
        with:
          name: Unit & Integration Tests
          path: junit-reports/**/*.xml
          reporter: java-junit
          fail-on-error: false
